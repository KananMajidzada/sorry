<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🎀</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe4e1; /* Rose White */
            font-family: 'Comic Sans MS', 'cursive', sans-serif;
            overflow: hidden;
            transition: background 0.5s;
        }

        #card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.2);
            text-align: center;
            border: 5px solid #ffb6c1;
            max-width: 450px;
            z-index: 10;
        }

        .main-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
            animation: bounce 2s infinite;
        }

        h1 {
            color: #ff69b4;
            font-size: 28px;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 100px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background-color: #ff85a2;
            color: white;
        }

        #noBtn {
            background-color: #f0f0f0;
            color: #999;
            position: relative;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .floating-heart {
            position: absolute;
            font-size: 20px;
            color: #ff69b4;
            animation: float 3s linear forwards;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="card">
        <div id="emoji" class="main-emoji">🥺</div>
        <h1 id="question">Can you please forgive me?</h1>
        
        <div class="button-group">
            <button id="yesBtn" onclick="celebrate()">Yes!</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
        </div>
        <p id="sad-note" style="margin-top: 20px; color: #ffb6c1; min-height: 24px;"></p>
    </div>

    <script>
        const sadEmojis = ["😢", "😭", "😿", "💔", "🥀", "🥺"];
        const sadTexts = ["Pretty please?", "I'll give you snacks!", "I'm so sowwy...", "Look at my sad eyes!", "I'll be the best ever!"];
        let noClicks = 0;

        function moveButton() {
            noClicks++;
            const noBtn = document.getElementById('noBtn');
            const emoji = document.getElementById('emoji');
            const note = document.getElementById('sad-note');

            // Move the button to a random spot so she can't catch it easily
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            // Change emoji and text
            emoji.innerText = sadEmojis[noClicks % sadEmojis.length];
            note.innerText = sadTexts[noClicks % sadTexts.length];
            
            // Make "Yes" button slightly bigger each time
            const yesBtn = document.getElementById('yesBtn');
            const currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            yesBtn.style.fontSize = (currentSize + 2) + "px";
            
            // Create a sad emoji that floats up
            createHeart(sadEmojis[noClicks % sadEmojis.length]);
        }

        function celebrate() {
            const card = document.getElementById('card');
            document.body.style.backgroundColor = "#fff0f5";
            
            card.innerHTML = `
                <div class="main-emoji">💖</div>
                <h1 style="color: #ff1493;">Yay! Thank you! 🧸</h1>
                <p style="font-size: 1.2rem; color: #ff69b4;">.<br>I love you!</p>
                <div style="font-size: 2rem; margin-top: 15px;">💐🍭✨</div>
            `;

            // Shower of hearts
            setInterval(() => {
                createHeart('❤️');
                createHeart('🌸');
            }, 300);
        }

        function createHeart(symbol) {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerText = symbol;
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.top = "100vh";
            heart.style.fontSize = (Math.random() * 20 + 20) + "px";
            document.body.appendChild(heart);
            
            setTimeout(() => { heart.remove(); }, 3000);
        }
    </script>
</body>
</html>
